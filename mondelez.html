<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondelez</title>
  <link rel="stylesheet" href="loadboard.css">
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>Dispatch</span>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="board-view">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1 id="mondelez-title">Mondelez</h1>
        <div class="subtext" id="mondelez-subtext"></div>
      </div>
      <div class="date-nav" style="position:relative;">
        <button id="date-prev" title="Previous day">&lsaquo;</button>
        <input type="date" id="date-input" readonly>
        <button id="date-next" title="Next day">&rsaquo;</button>
        <button id="date-today" class="today-pill">Today</button>
        <div id="date-dropdown" class="date-dropdown hidden"></div>
      </div>
      <div class="toolbar-actions">
        <button class="btn btn-ghost" id="btn-add-driver">+ Add Driver</button>
      </div>
    </div>

    <div id="driver-sync-status" class="hidden"></div>

    <div class="location-tabs" id="mondelez-location-tabs" style="padding: 12px 20px 0;"></div>

    <div id="mondelez-rate-panel" style="padding: 12px 20px 0;"></div>

    <div class="grid-scroll">
      <table class="board" id="mondelez-table"></table>
    </div>
    <div id="mondelez-empty-state" class="board-empty hidden">No Mondelez loads yet for this day. Use "+ Add Row" to start filling in the sheet.</div>
  </div>

  <!-- ================= Add Driver modal ================= -->
  <div class="overlay hidden" id="modal-add-driver">
    <div class="modal">
      <div class="modal-header">
        <h3 id="ad-modal-title">Add Driver</h3>
        <button class="modal-close" id="ad-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="ad-name">Driver name</label>
          <input type="text" id="ad-name">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-phone">Driver cell</label>
          <input type="tel" id="ad-phone">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-mc">MC number</label>
          <input type="text" id="ad-mc" inputmode="numeric" placeholder="Digits only">
          <div class="field-error">Required, digits only.</div>
        </div>
        <div class="field">
          <label for="ad-dispatcher-phone">Dispatcher phone number</label>
          <input type="tel" id="ad-dispatcher-phone">
        </div>
        <div class="field">
          <label for="ad-email">Email</label>
          <input type="email" id="ad-email">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-email2">2nd email (optional)</label>
          <input type="email" id="ad-email2">
        </div>
        <div class="field">
          <label for="ad-rating">Driver rating (leave blank if unknown)</label>
          <input type="text" id="ad-rating" placeholder="e.g. A1">
        </div>
        <div class="field">
          <label for="ad-preference">Driver preference</label>
          <select id="ad-preference">
            <option value="">-- none set --</option>
            <option value="long">Long</option>
            <option value="early">Early</option>
            <option value="late">Late</option>
            <option value="last minute">Last minute</option>
          </select>
        </div>
        <div class="field">
          <label for="ad-carrier">Carrier</label>
          <input type="text" id="ad-carrier">
        </div>
        <div class="field">
          <label for="ad-rate-booking">Rate/booking contact</label>
          <input type="text" id="ad-rate-booking" placeholder="Rate and/or who to contact to book">
        </div>
        <div class="field">
          <label for="ad-notes">Notes</label>
          <textarea id="ad-notes"></textarea>
        </div>
        <div class="field">
          <label>Trailer interchange agreement</label>
          <div class="radio-row">
            <label><input type="radio" name="ad-tia" value="yes"> Yes</label>
            <label><input type="radio" name="ad-tia" value="no" checked> No</label>
          </div>
        </div>
        <div class="field">
          <label for="ad-tii-amount">Interchange coverage ($ &mdash; leave blank if none)</label>
          <input type="number" id="ad-tii-amount" min="0" step="0.01">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="ad-cancel">Cancel</button>
        <button class="btn" id="ad-submit">Add</button>
      </div>
    </div>
  </div>

  <!-- ================= Send Text modal ================= -->
  <div class="overlay hidden" id="modal-send-text">
    <div class="modal">
      <div class="modal-header">
        <h3>Send Text</h3>
        <button class="modal-close" id="send-text-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>To</label><div class="static-text" id="send-text-phone-display"></div></div>
        <div class="field">
          <label>Message</label>
          <textarea class="cell-input" id="send-text-message" rows="5" style="width:100%;" placeholder="Type your message..."></textarea>
          <div class="subtext" id="send-text-counter" style="margin-top:4px;">0 characters — 1 text</div>
        </div>
        <div class="subtext" id="send-text-status" style="margin-top:8px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="send-text-cancel">Cancel</button>
        <button class="btn" id="send-text-submit">Send</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="loadboard.js" defer></script>
</body>
</html>

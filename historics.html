<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch Load Board</title>
  <link rel="stylesheet" href="loadboard.css">
</head>
<body>

  <!-- ================= Top nav ================= -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>Dispatch</span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab-btn" data-tab="atlanta">Home</button>
      <button class="tab-btn" data-tab="delaware">Delaware</button>
      <button class="tab-btn" data-tab="buildingc">Building C</button>
      <button class="tab-btn" data-tab="houston">Houston</button>
      <button class="tab-btn" data-tab="accounting">Accounting</button>
      <button class="tab-btn" data-tab="driverlist">Driver List</button>
      <button class="tab-btn" data-tab="historics">Historics</button>
    </div>
  </div>

  

  <!-- ================= Historics (placeholder) ================= -->
  <div id="historics-view" class="placeholder hidden">
    <h2>Historics</h2>
    <p>Anything older than 3 months will live here. The daily board only keeps a rolling 90-day window.</p>
  </div>

  

  <script src="loadboard.js" defer></script>
</body>
</html>

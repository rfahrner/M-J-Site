<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver List</title>
  <link rel="stylesheet" href="loadboard.css">
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>Dispatch</span>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="driverlist-view" class="panel">
    <div class="toolbar" style="padding-left:0;padding-right:0;border-bottom:none;">
      <div class="toolbar-left">
        <h1 style="margin-top:0;">Driver List</h1>
        <div class="subtext">Every driver on file. Newly added drivers stay highlighted for 30 minutes.</div>
      </div>
      <div class="toolbar-actions">
        <button class="btn" id="btn-add-driver">+ Add Driver</button>
      </div>
    </div>
    <table class="driverlist">
      <thead>
        <tr>
          <th>Name</th><th>Phone</th><th>MC #</th><th>Dispatcher</th><th>Dispatcher Phone</th>
          <th>Email</th><th>Rating</th><th>Trailer Interchange Agmt</th><th>Trailer Interchange Ins.</th><th>Notes</th>
        </tr>
      </thead>
      <tbody id="driverlist-table-body"></tbody>
    </table>
  </div>

  <!-- ================= Add Driver modal ================= -->
  <div class="overlay hidden" id="modal-add-driver">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Driver</h3>
        <button class="modal-close" id="ad-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="ad-name">Driver name</label>
          <input type="text" id="ad-name">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-phone">Driver number</label>
          <input type="tel" id="ad-phone">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-mc">MC number</label>
          <input type="text" id="ad-mc">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-dispatcher-name">Dispatcher name (optional)</label>
          <input type="text" id="ad-dispatcher-name">
        </div>
        <div class="field">
          <label for="ad-dispatcher-phone">Dispatcher number</label>
          <input type="tel" id="ad-dispatcher-phone">
        </div>
        <div class="field">
          <label for="ad-email">Contact email</label>
          <input type="email" id="ad-email">
          <div class="field-error">Required.</div>
        </div>
        <div class="field">
          <label for="ad-rating">Driver rating (leave blank if unknown)</label>
          <input type="text" id="ad-rating" placeholder="e.g. A1">
        </div>
        <div class="field">
          <label for="ad-notes">Notes</label>
          <textarea id="ad-notes"></textarea>
        </div>
        <div class="field">
          <label>Trailer interchange agreement</label>
          <div class="radio-row">
            <label><input type="radio" name="ad-tia" value="yes"> Yes</label>
            <label><input type="radio" name="ad-tia" value="no" checked> No</label>
          </div>
        </div>
        <div class="field">
          <label>Trailer interchange insurance</label>
          <div class="radio-row">
            <label><input type="radio" name="ad-tii" value="yes"> Yes</label>
            <label><input type="radio" name="ad-tii" value="no" checked> No</label>
          </div>
        </div>
        <div class="field hidden" id="ad-tii-amount-wrap">
          <label for="ad-tii-amount">Insurance amount ($)</label>
          <input type="number" id="ad-tii-amount" min="0" step="1">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="ad-cancel">Cancel</button>
        <button class="btn" id="ad-submit">Add</button>
      </div>
    </div>
  </div>

  <script src="loadboard.js" defer></script>
</body>
</html>

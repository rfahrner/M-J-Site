<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting</title>
  <link rel="stylesheet" href="loadboard.css">
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>Dispatch</span>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="driverlist-view" class="panel">
    <div class="toolbar" style="padding-left:0;padding-right:0;border-bottom:none;">
      <div class="toolbar-left">
        <h1 style="margin-top:0;">Accounting</h1>
        <div class="subtext">Loads land here automatically when marked Shift Complete on any board. Cost/Revenue Level, status, and Total Carrier Pay are editable per load.</div>
      </div>
      <div class="toolbar-actions" style="align-items:center; gap:8px;">
        <label for="fsc-rate-input" style="font-size:12.5px; font-weight:700;">Current FSC Rate</label>
        <input type="number" id="fsc-rate-input" step="0.01" min="0" style="width:80px; padding:6px 8px; border:1px solid var(--slate-500); border-radius:var(--radius-sm);">
        <button class="btn" id="btn-save-fsc">Save FSC Rate</button>
      </div>
    </div>
    <div class="location-tabs" id="acct-location-tabs">
      <button type="button" class="location-tab" data-location="atlanta">Atlanta</button>
      <button type="button" class="location-tab" data-location="buildingc">Building C</button>
      <button type="button" class="location-tab" data-location="delaware">Delaware</button>
      <button type="button" class="location-tab" data-location="houston">Houston</button>
    </div>
    <div class="date-nav" style="position:relative; padding: 0 0 14px 0;">
      <button id="date-prev" title="Previous day">&lsaquo;</button>
      <input type="date" id="date-input" readonly>
      <button id="date-next" title="Next day">&rsaquo;</button>
      <button id="date-today" class="today-pill">Today</button>
      <button type="button" class="btn btn-ghost" id="acct-show-all" style="margin-left:8px;">Show All Days</button>
      <div id="date-dropdown" class="date-dropdown hidden"></div>
    </div>
    <div class="location-tabs" id="acct-view-toggle" style="margin-bottom:14px;">
      <button type="button" class="location-tab is-active" data-view="byload">By Load</button>
      <button type="button" class="location-tab" data-view="bydriver">By Driver</button>
    </div>
    <div id="driver-sync-status" class="hidden"></div>
    <div class="driverlist-scroll" id="acct-byload-view">
      <table class="driverlist" id="accounting-table">
        <thead id="accounting-table-head"></thead>
        <tbody id="accounting-table-body"></tbody>
      </table>
    </div>
    <div class="driverlist-scroll hidden" id="acct-bydriver-view">
      <table class="driverlist" id="accounting-driver-table">
        <thead>
          <tr>
            <th>Driver</th>
            <th># of Loads</th>
            <th>Total Miles</th>
            <th>Total Stops</th>
            <th>Total Cost</th>
            <th>Total Revenue</th>
            <th>Total Carrier Pay</th>
            <th>Avg Carrier Pay / Load</th>
          </tr>
        </thead>
        <tbody id="accounting-driver-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ================= Load Details modal (PRO#/Trip ID popup) ================= -->
  <div class="overlay hidden" id="modal-load-details">
    <div class="modal modal-large">
      <div class="modal-header">
        <h3 id="ld-title">Load Details</h3>
        <button class="modal-close" id="ld-close">&times;</button>
      </div>
      <div class="modal-tabs" id="ld-tabs"></div>
      <div class="modal-body" id="ld-tab-content"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="ld-close-btn">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="loadboard.js" defer></script>
</body>
</html>
